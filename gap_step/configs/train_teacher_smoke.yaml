seed: 0
device: auto
steps_per_stage: 256
total_steps: 512
rollout_steps: 128
minibatch_size: 64
update_epochs: 2
learning_rate: 0.0003
gamma: 0.99
gae_lambda: 0.95
clip_ratio: 0.2
value_coef: 0.5
entropy_coef: 0.01
max_grad_norm: 0.5
checkpoint_path: checkpoints/teacher_final.pt
train_metrics_path: results/train_metrics.csv
env:
  stage_name: C1
  split: train
  dt: 0.1
  robot_radius: 0.25
  safe_margin: 0.1
  v_max: 2.0
  a_max: 3.0
  max_steps: 500
  num_rays: 32
  ray_max_dist_ratio: 0.35
  reward_progress: 2.0
  reward_timeout: -5.0
  progress_mode: dynamic_geometry
  gate_lookahead_time: 20.0
