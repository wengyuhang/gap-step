seed: 0
device: auto
steps_per_stage: 300000
total_steps: 2100000
curriculum_mode: stagewise
stage_order: [C1, C1_5, C2A, C2B, C3, C4, C5]
promotion_success_rate: 0.70
promotion_eval_success_rate: 0.60
promotion_eval_episodes: 50
promotion_eval_interval_updates: 10
promotion_window_episodes: 100
min_steps_per_stage: 500000
soft_max_steps_per_stage: 5000000
hard_max_steps_per_stage: 10000000
hard_max_policy: stop
rollout_steps: 4096
minibatch_size: 512
update_epochs: 4
learning_rate: 0.0001
gamma: 0.99
gae_lambda: 0.95
clip_ratio: 0.2
value_coef: 0.5
entropy_coef: 0.0001
target_kl: 0.2
max_grad_norm: 0.5
normalize_advantage: true
model_type: gnn
gnn_hidden_dim: 128
gnn_layers: 4
min_log_std: -2.0
max_log_std: 0.0
log_std_init: -1.0
checkpoint_dir: checkpoints
results_dir: results
log_interval_updates: 1
env:
  stage_name: C1
  split: train
  dt: 0.1
  robot_radius: 0.25
  safe_margin: 0.1
  v_max: 2.0
  a_max: 3.0
  max_steps: 500
  reward_progress: 4.0
  reward_timeout: -20.0
  progress_mode: dynamic_geometry
  suppress_positive_progress_on_collision: true
  gate_lookahead_time: 20.0
  progress_delta_clip: 0.25
