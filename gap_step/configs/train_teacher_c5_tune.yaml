seed: 1
device: cuda
steps_per_stage: 10240
total_steps: 10240
curriculum_mode: stagewise
stage_order: [C5]
rollout_steps: 2048
minibatch_size: 512
update_epochs: 4
learning_rate: 0.0001
gamma: 0.99
gae_lambda: 0.95
clip_ratio: 0.2
value_coef: 0.5
entropy_coef: 0.00005
target_kl: 0.2
max_grad_norm: 0.5
normalize_advantage: true
model_type: gnn
gnn_hidden_dim: 128
gnn_layers: 4
min_log_std: -2.5
max_log_std: -0.5
log_std_init: -1.5
checkpoint_dir: checkpoints
results_dir: results
log_interval_updates: 1
env:
  stage_name: C5
  split: train
  dt: 0.1
  robot_radius: 0.1
  safe_margin: 0.0
  v_max: 2.0
  a_max: 3.0
  max_steps: 800
  reward_progress: 4.0
  reward_guidance: 0.5
  reward_timeout: -20.0
  progress_mode: dynamic_geometry
  suppress_positive_progress_on_collision: true
  gate_lookahead_time: 20.0
  progress_delta_clip: 0.25
