seed: 7
device: auto
output_root: results/passage_generated
checkpoint_root: checkpoints/passage_generated
clean_outputs: true
stage_order: [C1, C2, C3, C4, C5]
rollout_steps: 256
updates_per_stage: 1
minibatch_size: 128
update_epochs: 1
learning_rate: 0.00003
gamma: 0.985
gae_lambda: 0.92
clip_ratio: 0.15
value_coef: 0.5
entropy_coef: 0.00005
target_kl: 0.08
max_grad_norm: 0.5
bc_episodes_per_stage: 8
bc_epochs: 1
bc_batch_size: 128
bc_learning_rate: 0.00003
reset_actor_residual: true
eval_episodes: 20
gnn_hidden_dim: 64
gnn_layers: 1
min_log_std: -2.0
max_log_std: -0.4
log_std_init: -1.4
env:
  max_steps: 240
  max_step: 1.08
  robot_radius: 0.20
  return_graph_obs: false
teacher:
  replan_horizon: 300
  arrival_radius: 0.18
